<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Utsavya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #fdf7e8, #e9dcc5);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 400px;
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        h2 { color: #8a6d4b; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #a6845d, #8f6e4c);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .back-link {
            margin-top: 20px;
            display: block;
            color: #a6845d;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Reset Your Password</h2>
        <p>Type in the OTP sent and your new password below.</p>
        <form id="resetForm">
            <input type="text" id="otp" name="otp" required placeholder="Enter OTP (sent to email)">
            <input type="password" id="newPassword" name="newPassword" required placeholder="Enter new password">
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password">
            <button type="submit">Reset Password</button>
        </form>
        <a href="forgot_password.html" class="back-link">Change Email</a>
    </div>

    <script>
        const resetEmail = sessionStorage.getItem('resetEmail');
        if (!resetEmail) {
            alert('No email found in session. Redirecting...');
            window.location.href = 'forgot_password.html';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            try {
                const res = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail, otp, newPassword })
                });
                
                const data = await res.json();
                if (res.ok) {
                    alert('Password has been reset successfully!');
                    sessionStorage.removeItem('resetEmail');
                    window.location.href = 'login2.html';
                } else {
                    alert(data.message || 'Error occurred');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            }
        });
    </script>
</body>
</html>
