<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff5e6, #f7e7ce);
        }

        /* CARD */

        .card {
            width: 360px;
            padding: 70px 30px 40px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
        }

        /* MONKEY CIRCLE */

        .monkey-box {
            position: absolute;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* MONKEY IMAGE */

        .monkey {
            width: 100px;
            height: 100px;
            object-fit: contain;
            animation: wave 3s infinite ease-in-out;
        }

        /* HAND WAVE EFFECT */

        @keyframes wave {
            0% {
                transform: rotate(0deg) translateY(0);
            }

            25% {
                transform: rotate(-5deg) translateY(-5px);
            }

            50% {
                transform: rotate(5deg) translateY(-10px);
            }

            75% {
                transform: rotate(-5deg) translateY(-5px);
            }

            100% {
                transform: rotate(0deg) translateY(0);
            }
        }

        /* HI TEXT */

        .hi {
            position: absolute;
            top: -10px;
            right: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #7a4c00;
            animation: hiMove 2s infinite;
        }

        @keyframes hiMove {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0);
            }
        }

        /* INPUTS */

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 25px;
            background: #f3f3f3;
            box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.1);
            outline: none;
        }

        /* BUTTON */

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 25px;
            background: #dd4646;
            color: white;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
        }

        button:hover {
            background: #972c2c;
        }

        h1 {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="monkey-box">

            <span class="hi">Hi</span>

            <img class="monkey" src="https://media.tenor.com/wJr9kQAbw7QAAAAi/pawsum-playpawsum.gif">

        </div>

        <h1>Signup</h1>

        <form id="signupForm">
            <input type="text" name="full_name" placeholder="Full name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>

        <form id="otpForm" style="display:none;">
            <input type="hidden" id="otpEmail" name="email">
            <input type="text" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
            <button type="submit">Verify OTP</button>
        </form>

    </div>


    <script>

        // Intercept signup form
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const email = formData.get('email');

            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            });

            if (res.ok) {
                document.getElementById('signupForm').style.display = 'none';
                document.getElementById('otpEmail').value = email;
                document.getElementById('otpForm').style.display = 'block';
                alert('OTP sent to your email!');
            } else {
                const error = await res.json();
                if (error.errors && error.errors.length > 0) {
                    alert('Validation Error: ' + error.errors.map(err => `${err.param}: ${err.msg}`).join(', '));
                } else {
                    alert(error.message || 'Signup failed');
                }
            }
        });

        // OTP verify
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);

            const res = await fetch('/auth/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            });

            if (res.ok) {
                const { accessToken } = await res.json();
                localStorage.setItem('accessToken', accessToken);
                localStorage.setItem('authToken', accessToken); // old key support
                alert('Email verified! You are logged in.');
                window.location.href = 'dashboard.html';
            } else {
                const error = await res.json();
                alert('Invalid OTP: ' + (error.message || 'Verification failed'));
            }

        });

    </script>

<script src="js/navbar.js"></script>
</body>

</html>
