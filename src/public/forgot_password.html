<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Utsavya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #fdf7e8, #e9dcc5);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 400px;
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        h2 { color: #8a6d4b; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #a6845d, #8f6e4c);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .back-link {
            margin-top: 20px;
            display: block;
            color: #a6845d;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Forgot Password?</h2>
        <p>No worries! Enter your email and we'll send you an OTP to reset your password.</p>
        <form id="forgotForm">
            <input type="email" name="email" id="email" required placeholder="Enter your email">
            <button type="submit">Send OTP</button>
        </form>
        <a href="login2.html" class="back-link">Back to Login</a>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            try {
                const res = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                if (res.ok) {
                    alert('OTP has been sent to your email.');
                    // Store email for reset page
                    sessionStorage.setItem('resetEmail', email);
                    window.location.href = 'reset_password.html';
                } else {
                    alert(data.message || 'Error occurred');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            }
        });
    </script>
</body>
</html>
